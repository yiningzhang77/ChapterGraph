<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>ChapterGraph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="./runtime-config.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: #f8fafc;
            --text: #0f172a;
            --panel: rgba(255, 255, 255, 0.9);
            --panel-border: rgba(15, 23, 42, 0.12);
            --edge: rgba(100, 116, 139, 0.22);
            --accent: #2563eb;
            --error: #dc2626;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg: #0f0f0f;
            --text: #e5e7eb;
            --panel: rgba(15, 23, 42, 0.85);
            --panel-border: rgba(148, 163, 184, 0.2);
            --edge: rgba(148, 163, 184, 0.25);
            --accent: #60a5fa;
            --error: #f87171;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            overflow: hidden;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #topbar {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #tooltip {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 10px 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
            max-width: 260px;
            font-size: 12px;
            line-height: 1.4;
            opacity: 0;
            transform: translate(8px, 8px);
            transition: opacity 120ms ease;
        }

        #askPanel {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 11;
            width: min(360px, calc(100vw - 20px));
            max-height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            backdrop-filter: blur(8px);
            box-sizing: border-box;
        }

        #askPanel.demoLayout {
            width: calc(50vw - 20px);
            height: calc(100vh - 20px);
            max-height: none;
        }

        .guidedDemoOverlay {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            width: min(720px, calc(100vw - 32px));
            border: 1px solid rgba(37, 99, 235, 0.24);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.96);
            color: var(--text);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
            padding: 14px 16px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
        }

        .guidedDemoOverlayError {
            border-color: rgba(220, 38, 38, 0.28);
            background: rgba(255, 255, 255, 0.98);
        }

        .guidedDemoOverlayBadge {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .guidedDemoOverlayTitle {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .guidedDemoOverlayPhase {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.82;
            margin-bottom: 8px;
        }

        .guidedDemoOverlayText,
        .guidedDemoOverlayAction {
            font-size: 13px;
            line-height: 1.55;
        }

        .guidedDemoOverlayAction {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(148, 163, 184, 0.22);
            opacity: 0.82;
        }

        .guidedDemoOverlayActions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
        }

        .guidedDemoOverlayBtn {
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            color: var(--text);
        }

        .guidedDemoOverlayBtn.primary {
            background: rgba(37, 99, 235, 0.12);
            border-color: rgba(37, 99, 235, 0.28);
            color: var(--accent);
        }

        .guidedDemoOverlayBtn.secondary {
            background: rgba(255, 255, 255, 0.78);
        }

        .guidedDemoOverlayBtn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .askHeader {
            font-size: 14px;
            font-weight: 700;
        }

        .askModeRow {
            display: flex;
            gap: 8px;
        }

        .askModeBtn,
        .guidedDemoBtn,
        .askSubmit,
        #themeToggle,
        #topbar select {
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
            color: var(--text);
            padding: 8px 10px;
            font-size: 12px;
        }

        :root[data-theme="dark"] .askModeBtn,
        :root[data-theme="dark"] .guidedDemoBtn,
        :root[data-theme="dark"] .askSubmit,
        :root[data-theme="dark"] #themeToggle,
        :root[data-theme="dark"] #topbar select {
            background: rgba(15, 23, 42, 0.5);
        }

        .askModeBtn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .guidedDemoBtn {
            cursor: pointer;
            border-color: rgba(37, 99, 235, 0.28);
            background: rgba(37, 99, 235, 0.08);
            color: var(--accent);
            font-weight: 600;
        }

        .guidedDemoBtn.running {
            border-color: rgba(234, 88, 12, 0.28);
            background: rgba(251, 146, 60, 0.12);
            color: #9a3412;
        }

        :root[data-theme="dark"] .guidedDemoBtn {
            background: rgba(96, 165, 250, 0.12);
            border-color: rgba(96, 165, 250, 0.28);
        }

        :root[data-theme="dark"] .guidedDemoBtn.running {
            background: rgba(249, 115, 22, 0.18);
            color: #fdba74;
        }

        .askSelectedChapter {
            font-size: 12px;
            opacity: 0.78;
        }

        .askSelectedChapter.hint {
            border: 1px dashed var(--panel-border);
            border-radius: 8px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.45);
            color: var(--text);
        }

        .askSelectedChapter.hint.active {
            border-style: solid;
            border-color: var(--accent);
            background: rgba(37, 99, 235, 0.08);
        }

        :root[data-theme="dark"] .askSelectedChapter.hint {
            background: rgba(2, 6, 23, 0.35);
        }

        :root[data-theme="dark"] .askSelectedChapter.hint.active {
            background: rgba(96, 165, 250, 0.15);
        }

        .askInput {
            width: 100%;
            min-height: 88px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px;
            resize: vertical;
            background: rgba(255, 255, 255, 0.78);
            color: var(--text);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.45;
        }

        :root[data-theme="dark"] .askInput {
            background: rgba(15, 23, 42, 0.5);
        }

        .askFieldLabel {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.8;
        }

        .askFieldInput {
            width: 100%;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.78);
            color: var(--text);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.4;
        }

        :root[data-theme="dark"] .askFieldInput {
            background: rgba(15, 23, 42, 0.5);
        }

        .askSubmit {
            cursor: pointer;
            align-self: flex-start;
        }

        .askSubmit:disabled {
            cursor: default;
            opacity: 0.65;
        }

        .askError {
            color: var(--error);
            font-size: 12px;
        }

        .askHint {
            border: 1px solid rgba(37, 99, 235, 0.18);
            border-radius: 8px;
            padding: 8px 10px;
            background: rgba(37, 99, 235, 0.06);
            color: var(--text);
            font-size: 12px;
            line-height: 1.45;
        }

        .askMessages {
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 8px;
            overflow: auto;
            min-height: 140px;
            max-height: 45vh;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.55);
        }

        #askPanel.demoLayout .askMessages {
            flex: 1;
            min-height: 0;
            max-height: none;
        }

        :root[data-theme="dark"] .askMessages {
            background: rgba(2, 6, 23, 0.35);
        }

        .askEmpty {
            font-size: 12px;
            opacity: 0.7;
        }

        .askMsg {
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.72);
        }

        :root[data-theme="dark"] .askMsg {
            background: rgba(15, 23, 42, 0.6);
        }

        .askMsg.user {
            border-color: rgba(37, 99, 235, 0.35);
        }

        .askMeta {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .askText {
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
        }

        .askText.userText {
            white-space: pre-wrap;
        }

        .askText.markdown p {
            margin: 0 0 10px;
        }

        .askText.markdown p:last-child {
            margin-bottom: 0;
        }

        .askText.markdown ul,
        .askText.markdown ol {
            margin: 0 0 10px 18px;
            padding: 0;
        }

        .askText.markdown li {
            margin-bottom: 4px;
        }

        .askText.markdown code {
            background: rgba(15, 23, 42, 0.08);
            border-radius: 6px;
            padding: 1px 5px;
            font-family: Consolas, Monaco, monospace;
            font-size: 12px;
        }

        .askText.markdown pre {
            margin: 0 0 10px;
            padding: 10px 12px;
            border-radius: 10px;
            overflow: auto;
            background: rgba(15, 23, 42, 0.08);
        }

        .askText.markdown pre code {
            background: transparent;
            padding: 0;
        }

        .askText.markdown strong {
            font-weight: 700;
        }

        .askWarning {
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 8px;
            font-size: 12px;
            line-height: 1.45;
        }

        .askWarningBlocked {
            border: 1px solid rgba(234, 88, 12, 0.28);
            background: rgba(251, 146, 60, 0.14);
            color: #9a3412;
        }

        .askWarningOverview {
            border: 1px solid rgba(37, 99, 235, 0.25);
            background: rgba(37, 99, 235, 0.08);
            color: #1d4ed8;
        }

        .askSuggestions {
            margin-bottom: 8px;
        }

        .askSuggestionsLabel {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.75;
            margin-bottom: 6px;
        }

        .askSuggestionList {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .askSuggestionChip {
            border: 1px solid rgba(37, 99, 235, 0.25);
            background: rgba(37, 99, 235, 0.08);
            color: var(--text);
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }

        :root[data-theme="dark"] .askWarningBlocked {
            background: rgba(249, 115, 22, 0.18);
            color: #fdba74;
        }

        :root[data-theme="dark"] .askWarningOverview {
            background: rgba(96, 165, 250, 0.12);
            color: #bfdbfe;
        }

        :root[data-theme="dark"] .askSuggestionChip {
            background: rgba(96, 165, 250, 0.12);
            border-color: rgba(96, 165, 250, 0.28);
        }

        :root[data-theme="dark"] .askHint {
            background: rgba(96, 165, 250, 0.1);
            border-color: rgba(96, 165, 250, 0.22);
        }

        :root[data-theme="dark"] .guidedDemoOverlay {
            background: rgba(15, 23, 42, 0.95);
            border-color: rgba(96, 165, 250, 0.26);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
        }

        :root[data-theme="dark"] .guidedDemoOverlayError {
            border-color: rgba(248, 113, 113, 0.26);
        }

        :root[data-theme="dark"] .guidedDemoOverlayBtn.primary {
            background: rgba(96, 165, 250, 0.16);
            border-color: rgba(96, 165, 250, 0.28);
            color: #bfdbfe;
        }

        :root[data-theme="dark"] .guidedDemoOverlayBtn.secondary {
            background: rgba(15, 23, 42, 0.5);
        }

        :root[data-theme="dark"] .askText.markdown code,
        :root[data-theme="dark"] .askText.markdown pre {
            background: rgba(2, 6, 23, 0.5);
        }

        @media (max-width: 900px) {
            #topbar {
                max-width: calc(100vw - 20px);
                overflow: auto;
            }

            #askPanel {
                width: calc(100vw - 20px);
                max-height: 42vh;
                top: auto;
                bottom: 10px;
            }

            #askPanel.demoLayout {
                width: calc(100vw - 20px);
                height: 52vh;
                top: auto;
                bottom: 10px;
            }

            .askMessages {
                max-height: 20vh;
            }

            .guidedDemoOverlay {
                top: 56px;
                width: calc(100vw - 20px);
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="app.js"></script>
</body>

</html>

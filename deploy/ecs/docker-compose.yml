services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=50
    volumes:
      - chaptergraph_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: deploy/ecs/backend.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      QWEN_PROVIDER: ${QWEN_PROVIDER}
      QWEN_BASE_URL: ${QWEN_BASE_URL}
      QWEN_API_KEY: ${QWEN_API_KEY}
      QWEN_MODEL: ${QWEN_MODEL}
      QWEN_TEMPERATURE: ${QWEN_TEMPERATURE}
      QWEN_MAX_TOKENS: ${QWEN_MAX_TOKENS}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: deploy/ecs/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  chaptergraph_db:

